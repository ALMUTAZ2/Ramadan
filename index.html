<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فوازير رمضان</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    *{font-family:'Cairo',sans-serif}

    .option-correct{background:rgba(34,197,94,.2)!important;border-color:rgb(34,197,94)!important}
    .option-wrong{background:rgba(239,68,68,.2)!important;border-color:rgb(239,68,68)!important}
  </style>
</head>

<body class="bg-gradient-to-b from-blue-900 to-indigo-950 min-h-screen text-white">

<!-- شاشة البداية -->
<div id="start-screen" class="min-h-screen flex items-center justify-center p-6">
  <div class="bg-white/10 border border-green-400/20 rounded-2xl p-8 max-w-md w-full text-center">
    <h1 class="text-3xl font-bold text-yellow-400 mb-6">فوازير رمضان</h1>

    <input id="player-name" placeholder="الاسم"
      class="w-full mb-4 bg-white/5 border p-4 rounded-xl text-center">

    <input id="player-phone" placeholder="05xxxxxxxx"
      class="w-full mb-2 bg-white/5 border p-4 rounded-xl text-center">

    <p class="text-xs text-gray-400 mb-4">الوسيلة الوحيدة لتسليم الجائزة</p>

    <button id="start-button"
      class="w-full bg-green-600 py-4 rounded-xl opacity-50" disabled>
      بدء المسابقة
    </button>
  </div>
</div>

<!-- شاشة العد -->
<div id="countdown-screen" class="fixed inset-0 bg-blue-900/90 hidden flex items-center justify-center">
  <div class="text-6xl font-bold text-yellow-400" id="countdown-number"></div>
</div>

<!-- شاشة السؤال -->
<div id="quiz-screen" class="hidden p-6 max-w-2xl mx-auto">
  <h2 id="question-text" class="text-xl mb-6"></h2>
  <div id="options-container" class="space-y-3"></div>
</div>

<!-- شاشة النتيجة -->
<div id="results-screen" class="hidden text-center p-10">
  <h2 class="text-3xl text-yellow-400 mb-4">النتيجة</h2>
  <p id="final-score" class="text-xl"></p>
</div> 


  <script>

// ================= بنك أسئلة يوم 12 =================
const ramadanQuestions = {
12: [

{ question: "ما اسم شهر الصيام؟", options: ["رجب","رمضان","شوال","ذو الحجة"], correct: 1 },
{ question: "في أي سنة هجرية وقعت بدر؟", options: ["1 هـ","2 هـ","3 هـ","4 هـ"], correct: 1 },
{ question: "من قائد المسلمين في بدر؟", options: ["عمر","النبي ﷺ","علي","أبو بكر"], correct: 1 },
{ question: "ما اسم الليلة التي نزل فيها القرآن؟", options: ["ليلة القدر","ليلة الجمعة","ليلة النصف","ليلة العيد"], correct: 0 },
{ question: "في أي عشر من رمضان تُلتمس ليلة القدر؟", options: ["الأولى","الأوسط","الأواخر","كل الشهر"], correct: 2 },

{ question: "كم عدد أركان الإسلام؟", options: ["3","4","5","6"], correct: 2 },
{ question: "ما أول أركان الإسلام؟", options: ["الصلاة","الزكاة","الشهادتان","الصيام"], correct: 2 },
{ question: "كم عدد ركعات صلاة الفجر؟", options: ["2","3","4","5"], correct: 0 },
{ question: "ما اسم الصلاة التي تُصلّى في رمضان ليلاً؟", options: ["الوتر","التراويح","الضحى","الكسوف"], correct: 1 },
{ question: "كم عدد أجزاء القرآن؟", options: ["20","25","30","40"], correct: 2 },

{ question: "ما أطول سورة في القرآن؟", options: ["النساء","آل عمران","البقرة","المائدة"], correct: 2 },
{ question: "ما أقصر سورة؟", options: ["الإخلاص","الكوثر","الفلق","الناس"], correct: 1 },
{ question: "كم عدد سور القرآن؟", options: ["110","112","114","120"], correct: 2 },
{ question: "من خاتم الأنبياء؟", options: ["عيسى","موسى","محمد ﷺ","إبراهيم"], correct: 2 },
{ question: "ما اسم أم النبي؟", options: ["خديجة","آمنة بنت وهب","حفصة","فاطمة"], correct: 1 },

{ question: "في أي مدينة هاجر النبي؟", options: ["مكة","المدينة","الطائف","القدس"], correct: 1 },
{ question: "من أول الخلفاء؟", options: ["عمر","عثمان","علي","أبو بكر"], correct: 3 },
{ question: "كم عدد الخلفاء؟", options: ["3","4","5","6"], correct: 1 },
{ question: "من ثاني الخلفاء؟", options: ["عمر","عثمان","علي","أبو بكر"], correct: 0 },
{ question: "من ثالث الخلفاء؟", options: ["علي","عثمان","عمر","أبو بكر"], correct: 1 },

{ question: "ما اسم الغار الذي نزل فيه الوحي؟", options: ["ثور","حراء","أحد","قباء"], correct: 1 },
{ question: "من أول من أسلم من النساء؟", options: ["عائشة","خديجة","حفصة","أسماء"], correct: 1 },
{ question: "كم استمرت الدعوة في مكة؟", options: ["10","11","12","13"], correct: 3 },
{ question: "ما اسم عام ولادة النبي؟", options: ["عام الفيل","عام الحزن","عام بدر","عام الهجرة"], correct: 0 },
{ question: "ما أول مسجد في الإسلام؟", options: ["الحرام","النبوي","قباء","الأقصى"], correct: 2 }

]};

// ================= الحالة =================
let gameState={
  questions:[],
  current:0,
  score:0
};

// ================= اختيار 5 أسئلة عشوائية =================
function shuffleArray(a){
  return a.sort(()=>Math.random()-0.5);
}

function startQuiz(){
  gameState.questions = shuffleArray([...ramadanQuestions[12]]).slice(0,5);
  document.getElementById("start-screen").classList.add("hidden");
  startCountdown();
}

// ================= عد تنازلي =================
function startCountdown(){
  const screen=document.getElementById("countdown-screen");
  const num=document.getElementById("countdown-number");
  screen.classList.remove("hidden");

  let n=5;
  const int=setInterval(()=>{
    num.textContent=n;
    n--;
    if(n<0){
      clearInterval(int);
      screen.classList.add("hidden");
      showQuestion();
    }
  },1000);
}

// ================= عرض سؤال =================
function showQuestion(){
  document.getElementById("quiz-screen").classList.remove("hidden");

  const q=gameState.questions[gameState.current];
  document.getElementById("question-text").textContent=q.question;

  document.getElementById("options-container").innerHTML=q.options.map((o,i)=>
    `<button onclick="answer(${i})" class="w-full bg-white/5 border p-3 rounded-xl">${o}</button>`
  ).join("");
}

// ================= الإجابة =================
function answer(i){
  const q=gameState.questions[gameState.current];
  if(i===q.correct) gameState.score+=100;

  gameState.current++;
  if(gameState.current<5) showQuestion();
  else showResults();
}

// ================= النتائج =================
function showResults(){
  document.getElementById("quiz-screen").classList.add("hidden");
  document.getElementById("results-screen").classList.remove("hidden");
  document.getElementById("final-score").textContent=`نقاطك: ${gameState.score}`;
}

// ================= تفعيل الإدخال =================
const nameInput=document.getElementById("player-name");
const phoneInput=document.getElementById("player-phone");
const startBtn=document.getElementById("start-button");

function validate(){
  const phoneRegex=/^05\d{8}$/;
  if(nameInput.value.length>2 && phoneRegex.test(phoneInput.value)){
    startBtn.disabled=false;
    startBtn.classList.remove("opacity-50");
  }else{
    startBtn.disabled=true;
    startBtn.classList.add("opacity-50");
  }
}

nameInput.oninput=validate;
phoneInput.oninput=validate;
startBtn.onclick=startQuiz;

</script>
</body>
</html>
